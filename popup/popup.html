<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 360px;
      background: #f8f9fa;
      color: #333;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px 18px;
      text-align: center;
    }

    .header h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 0.72rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* Body */
    .body { padding: 14px 16px; }

    /* Status message */
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 12px;
      display: none;
    }

    .status.show { display: block; }
    .status.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .status.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    /* Instructions */
    .instructions {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .instructions h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .instructions ol {
      padding-left: 18px;
    }

    .instructions li {
      font-size: 0.78rem;
      color: #4b5563;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    /* Selection preview */
    .preview {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      max-height: 120px;
      overflow-y: auto;
    }

    .preview-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .preview-text {
      font-size: 0.82rem;
      color: #374151;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .preview-text.show { display: block; }

    .preview-empty {
      font-size: 0.8rem;
      color: #9ca3af;
      font-style: italic;
    }

    /* Page info */
    .page-info {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 0.75rem;
      color: #6b7280;
      padding: 8px 10px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    .page-info .favicon {
      width: 14px;
      height: 14px;
      border-radius: 2px;
    }

    .page-info .title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Filename input */
    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.85rem;
      background: white;
      color: #1f2937;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1.5px solid #d1d5db;
    }

    .btn-secondary:hover { background: #e5e7eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 8px;
      font-size: 0.7rem;
      color: #9ca3af;
      border-top: 1px solid #f3f4f6;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>📋 Markdown Clipboard</h1>
    <p>Highlight → Convert → Download</p>
  </div>

  <div class="body">
    <!-- Status -->
    <div id="status" class="status"></div>

    <!-- Instructions -->
    <div class="instructions">
      <h3>How to use:</h3>
      <ol>
        <li>Highlight any text on any webpage</li>
        <li>Click this extension icon</li>
        <li>Name your file and click <strong>Download</strong></li>
      </ol>
    </div>

    <!-- Selection preview -->
    <div class="preview">
      <div class="preview-label">Selected Text</div>
      <div id="previewText" class="preview-text"></div>
      <div id="previewEmpty" class="preview-empty">No text selected yet. Highlight some text on a webpage first!</div>
    </div>

    <!-- Page info -->
    <div class="page-info">
      <img id="favicon" class="favicon" src="" alt="" />
      <span id="pageTitle" class="title">—</span>
    </div>

    <!-- Filename -->
    <div class="input-group">
      <label for="filename">Filename</label>
      <input type="text" id="filename" placeholder="my-highlight" value="my-highlight" />
    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh</button>
      <button id="downloadBtn" class="btn btn-primary" disabled>📥 Download</button>
    </div>
  </div>

  <div class="footer">
    Saves as .md (Markdown) · UTF-8 encoding
  </div>

  <script src="popup.js"></script>
</body>
</html>
